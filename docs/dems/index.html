<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>DEMS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a1a1a;--bg2:#242424;--bg3:#2e2e2e;--bg4:#383838;
  --border:#3a3a3a;--text:#e8e8e8;--text2:#a0a0a0;--text3:#666;
  --accent:#cc785c;--radius:10px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif
}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;-webkit-font-smoothing:antialiased}

/* MODE SWITCHER */
.mode-bar{
  display:flex;align-items:center;gap:0;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:8px;overflow:hidden;width:fit-content;
  margin-bottom:14px;
}
.mode-btn{
  padding:7px 18px;font-size:12px;font-weight:500;
  background:none;border:none;color:var(--text3);
  cursor:pointer;font-family:var(--font);letter-spacing:.03em;
  transition:all .15s;
}
.mode-btn:not(:last-child){border-right:1px solid var(--border);}
.mode-btn.active{background:var(--bg4);color:var(--text);}
.mode-btn:hover:not(.active){color:var(--text2);}

/* MSG TYPE */
.msgtype-bar{display:flex;gap:6px;margin-bottom:2px;}
.mt-btn{
  padding:5px 14px;font-size:12px;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:6px;color:var(--text2);cursor:pointer;
  font-family:var(--font);transition:all .15s;
}
.mt-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.mt-btn:hover:not(.active){background:var(--bg4);color:var(--text);}

.app{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);min-height:500px}
.col{background:var(--bg);padding:20px;display:flex;flex-direction:column;gap:12px;overflow-y:auto}
.slabel{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;font-weight:500;margin-bottom:-4px}
input[type=text],input[type=password]{width:100%;padding:8px 12px;font-size:13px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--font);outline:none}
input[type=text]:focus,input[type=password]:focus{border-color:#555}
input[type=color]{padding:3px 6px;height:34px;cursor:pointer;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);width:34px}
.row2{display:grid;grid-template-columns:1fr 34px;gap:8px;align-items:center}
.webhook-row{display:flex;gap:6px}
.webhook-row input{flex:1}
.save-btn{padding:8px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text2);font-size:12px;cursor:pointer;white-space:nowrap;font-family:var(--font)}
.save-btn:hover{background:var(--bg4);color:var(--text)}
.saved-ok{font-size:11px;color:#4caf50;margin-top:-8px;display:none}



/* FIELDS */
.field-block{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;display:flex;flex-direction:column;gap:8px}
.field-top{display:flex;gap:8px;align-items:center}
.field-top input{flex:1;padding:7px 10px;font-size:13px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font);outline:none}
.field-top input:focus{border-color:#555}
.inline-toggle{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);cursor:pointer;user-select:none;white-space:nowrap}
.inline-toggle input{width:14px;height:14px;accent-color:var(--accent);cursor:pointer}
.del-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;padding:2px 4px;border-radius:6px}
.del-btn:hover{color:#e24b4a;background:rgba(226,75,74,.1)}
.fmt-bar{display:flex;gap:4px;flex-wrap:wrap}
.fb{background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text2);font-size:12px;padding:3px 8px;cursor:pointer;line-height:1.4;font-family:var(--font)}
.fb:hover{background:var(--bg4);color:var(--text)}
.fb.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* EDITOR - resizable */
.editor-wrap{position:relative;}
.editor{
  min-height:80px;padding:9px 11px;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-size:13px;
  line-height:1.6;outline:none;cursor:text;word-break:break-word;
  resize:vertical;overflow:auto;
}
.editor:focus{border-color:#555}
.editor:empty:before{content:attr(data-placeholder);color:var(--text3);pointer-events:none}
.editor b,.editor strong{font-weight:700;color:#fff}
.editor i,.editor em{font-style:italic}
.editor u{text-decoration:underline}
.editor s{text-decoration:line-through;color:var(--text2)}
.editor code{background:#1e1f22;border:1px solid #444;border-radius:4px;padding:1px 5px;font-family:'Consolas',monospace;font-size:12px;color:#c9d1d9}
.editor pre{background:#1e1f22;border:1px solid #444;border-radius:6px;padding:8px 10px;font-family:'Consolas',monospace;font-size:12px;color:#c9d1d9;white-space:pre-wrap;margin:2px 0}
.editor .spoiler{background:#111;color:transparent;border-radius:3px;padding:0 3px;cursor:pointer;transition:all .15s}
.editor .spoiler:hover{color:var(--text);background:var(--bg4)}

/* plain textarea for plain mode */
.plain-editor{
  width:100%;min-height:100px;
  padding:9px 11px;font-size:13px;line-height:1.6;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-family:var(--font);
  outline:none;resize:vertical;
}
.plain-editor:focus{border-color:#555;}

.add-btn{font-size:13px;color:var(--text2);background:none;border:1px dashed var(--border);border-radius:var(--radius);padding:9px;cursor:pointer;width:100%;font-family:var(--font)}
.add-btn:hover{background:var(--bg2);border-color:#555}
.send-btn{padding:10px 16px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-weight:500;cursor:pointer;font-family:var(--font);margin-top:auto}
.send-btn:hover{background:#b8694e}
.send-btn:active{transform:scale(.98)}
.status{font-size:12px;color:var(--text3);min-height:16px;text-align:center}

/* PREVIEW */
.dc-bg{background:#1e1f22;padding:20px;min-height:100%}
.dc-msg{display:flex;gap:14px}
.dc-av{width:40px;height:40px;border-radius:50%;background:#5865F2;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:600}
.dc-uname{font-size:15px;font-weight:600;color:#fff}
.dc-apptag{font-size:10px;background:#5865F2;color:#fff;padding:1px 5px;border-radius:3px;margin-left:5px;vertical-align:middle}
.dc-time{font-size:11px;color:#87898c;margin-left:6px}
.embed{border-radius:4px;padding:12px 16px;margin-top:8px;border-left:4px solid #cc785c;background:#2b2d31;max-width:420px}
.embed-title{font-size:15px;font-weight:600;color:#fff;margin-bottom:10px}
.embed-fields{display:flex;flex-wrap:wrap;gap:10px}
.embed-field.full{width:100%}
.embed-field.half{width:calc(50% - 5px)}
.embed-fname{font-size:12px;font-weight:600;color:#fff;margin-bottom:3px}
.embed-fval{font-size:13px;color:#dcddde;white-space:pre-wrap;line-height:1.55}
.embed-fval b,.embed-fval strong{color:#fff;font-weight:700}
.embed-fval i,.embed-fval em{font-style:italic}
.embed-fval code{background:#111;border-radius:3px;padding:1px 4px;font-family:monospace;font-size:12px}
.embed-fval pre{background:#111;border-radius:4px;padding:6px 8px;font-family:monospace;font-size:12px;white-space:pre-wrap;margin:2px 0}
.embed-footer{font-size:11px;color:#87898c;margin-top:10px;border-top:1px solid #3a3b3f;padding-top:8px}
.embed-fval .spoiler{background-color:#202225;color:transparent;border-radius:4px;padding:0 4px;cursor:pointer;transition:all .15s}
.embed-fval .spoiler.revealed{background-color:#2b2d31;color:#dcddde}
.embed-fval .spoiler:hover:not(.revealed){background-color:#2b2d31}

/* plain preview */
.plain-preview{font-size:14px;color:#dcddde;line-height:1.6;margin-top:8px;white-space:pre-wrap;word-break:break-word;}

/* BOT SETTINGS panel (bottom right) */
.bot-settings{
  border-top:1px solid var(--border);
  padding-top:14px;margin-top:auto;
  display:flex;flex-direction:column;gap:10px;
}
.bot-settings-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;font-weight:500;}

/* hidden util */
.hidden{display:none!important;}
</style>
</head>
<body>

<div class="app">
  <!-- LEFT COL -->
  <div class="col" id="left-col">

    <!-- MODE SWITCHER -->
    <div>
      <div class="mode-bar">
        <button class="mode-btn active" id="btn-webhook" onclick="setMode('webhook')">Webhook</button>
        <button class="mode-btn" id="btn-bot" onclick="setMode('bot')">Bot</button>
      </div>
    </div>

    <!-- WEBHOOK MODE -->
    <div id="section-webhook">
      <div class="slabel">Webhook URL</div>
      <div class="webhook-row" style="margin-top:6px">
        <input type="text" id="webhook" placeholder="https://discord.com/api/webhooks/...">
        <button class="save-btn" onclick="saveWH()">Сохранить</button>
      </div>
      <div class="saved-ok" id="saved-ok">Сохранено</div>
    </div>

    <!-- BOT MODE -->
    <div id="section-bot" class="hidden">
      <div class="slabel">Bot Token</div>
      <div class="webhook-row" style="margin-top:6px">
        <input type="password" id="bot-token" placeholder="Bot токен...">
        <button class="save-btn" onclick="saveBotToken()">Сохранить</button>
      </div>
      <div class="saved-ok" id="saved-ok-bot">Сохранено</div>

      <div class="slabel" style="margin-top:12px">Channel ID</div>
      <input type="text" id="channel-id" placeholder="ID канала..." style="margin-top:6px">
    </div>

    <!-- BOT NAME -->
    <div class="slabel" id="lbl-username">Бот</div>
    <input type="text" id="username" value="DEMS" oninput="render()">

    <!-- MSG TYPE -->
    <div>
      <div class="slabel" style="margin-bottom:8px">Тип сообщения</div>
      <div class="msgtype-bar">
        <button class="mt-btn active" id="mt-embed" onclick="setMsgType('embed')">Embed</button>
        <button class="mt-btn" id="mt-plain" onclick="setMsgType('plain')">Обычное</button>
      </div>
    </div>

    <!-- EMBED FIELDS -->
    <div id="embed-section">
      <div class="slabel">Заголовок</div>
      <input type="text" id="etitle" value="Embed Message" oninput="render()" style="margin-top:6px">
      <div class="slabel" style="margin-top:10px">Цвет полосы</div>
      <div class="row2" style="margin-top:6px">
        <input type="text" id="ecolorHex" value="#cc785c" oninput="syncColor('hex')">
        <input type="color" id="ecolor" value="#cc785c" oninput="syncColor('pick')">
      </div>
      <div class="slabel" style="margin-top:10px">Поля</div>
      <div id="fields" style="display:flex;flex-direction:column;gap:8px;margin-top:6px"></div>
      <button class="add-btn" style="margin-top:6px" onclick="addField()">+ поле</button>
      <div class="slabel" style="margin-top:10px">Footer</div>
      <input type="text" id="efooter" value="DEMS | 19.04.2026" oninput="render()" style="margin-top:6px">
    </div>

    <!-- PLAIN SECTION -->
    <div id="plain-section" class="hidden">
      <div class="slabel">Сообщение</div>
      <textarea class="plain-editor" id="plain-text" placeholder="Текст сообщения..." oninput="render()"></textarea>
    </div>

    <button class="send-btn" onclick="sendMsg()">Отправить</button>
    <div class="status" id="status"></div>
  </div>

  <!-- RIGHT COL (preview) -->
  <div class="col" style="padding:0;position:relative;">
    <div class="dc-bg" style="flex:1">
      <div class="dc-msg">
        <div class="dc-av" id="pav">S</div>
        <div style="flex:1">
          <div>
            <span class="dc-uname" id="puname">DEMS</span>
            <span class="dc-apptag">APP</span>
            <span class="dc-time" id="ptime">00:00</span>
          </div>
          <!-- embed preview -->
          <div class="embed" id="pembed">
            <div class="embed-title" id="petitle">Embed Message</div>
            <div class="embed-fields" id="pefields"></div>
            <div class="embed-footer" id="pefooter">DEMS | 19.04.2026</div>
          </div>
          <!-- plain preview -->
          <div class="plain-preview hidden" id="pplain"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ── STATE ──
let currentMode = 'webhook'; // 'webhook' | 'bot'
let currentMsgType = 'embed'; // 'embed' | 'plain'


// ── MODE ──
function setMode(m) {
  currentMode = m;
  document.getElementById('btn-webhook').classList.toggle('active', m === 'webhook');
  document.getElementById('btn-bot').classList.toggle('active', m === 'bot');
  document.getElementById('section-webhook').classList.toggle('hidden', m !== 'webhook');
  document.getElementById('section-bot').classList.toggle('hidden', m !== 'bot');
}

// ── MSG TYPE ──
function setMsgType(t) {
  currentMsgType = t;
  document.getElementById('mt-embed').classList.toggle('active', t === 'embed');
  document.getElementById('mt-plain').classList.toggle('active', t === 'plain');
  document.getElementById('embed-section').classList.toggle('hidden', t !== 'embed');
  document.getElementById('plain-section').classList.toggle('hidden', t !== 'plain');
  document.getElementById('pembed').classList.toggle('hidden', t !== 'embed');
  document.getElementById('pplain').classList.toggle('hidden', t !== 'plain');
  render();
}

// ── SAVE WH ──
function saveWH() {
  const v = document.getElementById('webhook').value.trim();
  if (!v) return;
  document.cookie = `dc_wh=${encodeURIComponent(v)};max-age=31536000;path=/`;
  showSaved('saved-ok');
}
function saveBotToken() {
  const v = document.getElementById('bot-token').value.trim();
  if (!v) return;
  document.cookie = `dc_bt=${encodeURIComponent(v)};max-age=31536000;path=/`;
  showSaved('saved-ok-bot');
}
function showSaved(id) {
  const el = document.getElementById(id);
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 2000);
}
function loadCookies() {
  const wh = document.cookie.match(/dc_wh=([^;]+)/);
  if (wh) document.getElementById('webhook').value = decodeURIComponent(wh[1]);
  const bt = document.cookie.match(/dc_bt=([^;]+)/);
  if (bt) document.getElementById('bot-token').value = decodeURIComponent(bt[1]);
}



// ── EDITOR UTILS ──
function editorToMarkdown(editor) {
  let md = '';
  function walk(node) {
    if (node.nodeType === 3) { md += node.textContent; return; }
    const t = node.tagName;
    if (t === 'BR') { md += '\n'; return; }
    if (t === 'PRE') { md += '```\n' + node.innerText + '\n```'; return; }
    if (t === 'CODE') { md += '`' + node.innerText + '`'; return; }
    if (t === 'B' || t === 'STRONG') { md += '**'; node.childNodes.forEach(walk); md += '**'; return; }
    if (t === 'I' || t === 'EM') { md += '*'; node.childNodes.forEach(walk); md += '*'; return; }
    if (t === 'U') { md += '__'; node.childNodes.forEach(walk); md += '__'; return; }
    if (t === 'S') { md += '~~'; node.childNodes.forEach(walk); md += '~~'; return; }
    if (t === 'SPAN' && node.classList.contains('spoiler')) { md += '||' + node.innerText + '||'; return; }
    if (t === 'DIV') {
      if (md.length && !md.endsWith('\n')) md += '\n';
      node.childNodes.forEach(walk);
      return;
    }
    node.childNodes.forEach(walk);
  }
  editor.childNodes.forEach(walk);
  return md.trim();
}

function applyFmt(editor, tag) {
  editor.focus();
  const sel = window.getSelection();
  if (!sel.rangeCount) return;
  const range = sel.getRangeAt(0);
  const selected = range.toString();
  function insertNodeAndSelect(node) {
    node.textContent = selected || '\u200B';
    range.deleteContents();
    range.insertNode(node);
    const r = document.createRange();
    r.selectNodeContents(node);
    if (!selected) r.collapse(false);
    sel.removeAllRanges();
    sel.addRange(r);
  }
  if (tag === 'pre') {
    const pre = document.createElement('pre');
    insertNodeAndSelect(pre);
  } else if (tag === 'code') {
    const code = document.createElement('code');
    insertNodeAndSelect(code);
  } else if (tag === 'spoiler') {
    const sp = document.createElement('span');
    sp.className = 'spoiler';
    insertNodeAndSelect(sp);
  } else {
    document.execCommand(tag, false, null);
  }
  render();
}

function makeFmtBar(editor) {
  const bar = document.createElement('div');
  bar.className = 'fmt-bar';
  const btns = [
    { l: 'B', cmd: 'bold', title: 'Жирный' },
    { l: 'I', cmd: 'italic', title: 'Курсив' },
    { l: 'U', cmd: 'underline', title: 'Подчёркнутый' },
    { l: 'S', cmd: 'strikethrough', title: 'Зачёркнутый' },
    { l: '`code`', cmd: 'code', title: 'Инлайн код' },
    { l: '```блок```', cmd: 'pre', title: 'Блок кода' },
    { l: '||sp||', cmd: 'spoiler', title: 'Спойлер' },
  ];
  btns.forEach(({ l, cmd, title }) => {
    const b = document.createElement('button');
    b.className = 'fb'; b.textContent = l; b.title = title;
    b.onmousedown = (e) => { e.preventDefault(); applyFmt(editor, cmd); };
    bar.appendChild(b);
  });
  return bar;
}

function addField(f = { name: '', value: '', inline: false }) {
  const wrap = document.getElementById('fields');
  const div = document.createElement('div');
  div.className = 'field-block';
  const top = document.createElement('div'); top.className = 'field-top';
  const ni = document.createElement('input'); ni.type = 'text'; ni.placeholder = 'Название'; ni.value = f.name; ni.oninput = render;
  const lbl = document.createElement('label'); lbl.className = 'inline-toggle';
  const cb = document.createElement('input'); cb.type = 'checkbox'; cb.checked = f.inline; cb.onchange = render;
  lbl.append(cb, document.createTextNode('inline'));
  const db = document.createElement('button'); db.className = 'del-btn'; db.textContent = '×'; db.onclick = () => { div.remove(); render(); };
  top.append(ni, lbl, db);

  const editor = document.createElement('div');
  editor.className = 'editor';
  editor.contentEditable = true;
  editor.setAttribute('data-placeholder', 'Значение...');
  if (f.value) editor.innerText = f.value;
  editor.oninput = render;
  editor.onkeydown = (e) => {
    if (e.key === 'Enter') {
      const sel = window.getSelection();
      if (!sel.rangeCount) return;
      const range = sel.getRangeAt(0);
      let node = range.startContainer;
      let inlineNode = null;
      while (node && node !== editor) {
        if (node.tagName === 'PRE') {
          if (e.shiftKey) {
            e.preventDefault();
            const br = document.createElement('br');
            const after = document.createTextNode('\u200B');
            node.after(br, after);
            const r = document.createRange();
            r.setStart(after, 1); r.collapse(true);
            sel.removeAllRanges(); sel.addRange(r);
          }
          return;
        }
        if (node.tagName === 'CODE' || (node.tagName === 'SPAN' && node.classList.contains('spoiler'))) {
          inlineNode = node;
        }
        node = node.parentNode;
      }
      if (inlineNode) {
        e.preventDefault();
        const space = document.createTextNode('\u200B');
        inlineNode.after(space);
        if (!e.shiftKey) {
          const br = document.createElement('br');
          space.before(br);
        }
        const r = document.createRange();
        r.selectNodeContents(space); r.collapse(false);
        sel.removeAllRanges(); sel.addRange(r);
      }
    }
  };

  div.append(top, makeFmtBar(editor), editor);
  wrap.appendChild(div);
  render();
}

// ── COLOR SYNC ──
function syncColor(from) {
  if (from === 'pick') document.getElementById('ecolorHex').value = document.getElementById('ecolor').value;
  else { const v = document.getElementById('ecolorHex').value; if (/^#[0-9a-fA-F]{6}$/.test(v)) document.getElementById('ecolor').value = v; }
  render();
}

// ── MARKDOWN → HTML (fix: code block starts on same line in preview) ──
function mdToHtml(md) {
  return md
    .replace(/</g, '&lt;').replace(/>/g, '&gt;')
    // code block: trim leading/trailing newline inside ```
    .replace(/```\n?([\s\S]*?)\n?```/g, (_, code) => `<pre>${code.trim()}</pre>`)
    .replace(/`([^`\n]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^\*\n]+)\*\*/g, '<b>$1</b>')
    .replace(/\*([^\*\n]+)\*/g, '<i>$1</i>')
    .replace(/__([^\_\n]+)__/g, '<u>$1</u>')
    .replace(/~~([^\~\n]+)~~/g, '<s>$1</s>')
    .replace(/\|\|([\s\S]*?)\|\|/g, '<span class="spoiler" onclick="this.classList.toggle(\'revealed\')">$1</span>')
    .replace(/\n/g, '<br>');
}

// ── RENDER ──
function render() {
  const uname = document.getElementById('username').value || 'Bot';
  document.getElementById('puname').textContent = uname;
  document.getElementById('pav').textContent = uname[0].toUpperCase();
  document.getElementById('ptime').textContent = (() => {
    const n = new Date();
    return `сегодня в ${n.getHours().toString().padStart(2,'0')}:${n.getMinutes().toString().padStart(2,'0')}`;
  })();

  if (currentMsgType === 'embed') {
    document.getElementById('petitle').textContent = document.getElementById('etitle').value;
    document.getElementById('pembed').style.borderLeftColor = document.getElementById('ecolorHex').value;
    document.getElementById('pefooter').textContent = document.getElementById('efooter').value;

    const pef = document.getElementById('pefields');
    pef.innerHTML = '';
    document.querySelectorAll('#fields .field-block').forEach(block => {
      const name = block.querySelector('input[type=text]').value;
      const editor = block.querySelector('.editor');
      const inline = block.querySelector('input[type=checkbox]').checked;
      if (!name && !editor.innerText.trim()) return;
      const mdText = editorToMarkdown(editor);
      const d = document.createElement('div');
      d.className = 'embed-field ' + (inline ? 'half' : 'full');
      const fv = document.createElement('div');
      fv.className = 'embed-fval';
      fv.innerHTML = mdToHtml(mdText);
      d.innerHTML = `<div class="embed-fname">${name}</div>`;
      d.appendChild(fv);
      pef.appendChild(d);
    });
  } else {
    const txt = document.getElementById('plain-text').value;
    document.getElementById('pplain').textContent = txt;
  }
}

// ── TIME ──
function updateTime() {
  const n = new Date();
  document.getElementById('ptime').textContent = `сегодня в ${n.getHours().toString().padStart(2,'0')}:${n.getMinutes().toString().padStart(2,'0')}`;
}

// ── SEND ──
async function sendMsg() {
  const status = document.getElementById('status');

  if (currentMode === 'webhook') {
    const webhook = document.getElementById('webhook').value.trim();
    if (!webhook) { status.textContent = 'Укажи webhook URL'; return; }
    const payload = buildPayload();
    status.textContent = 'Отправляю...';
    try {
      const res = await fetch(webhook, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
      if (res.ok || res.status === 204) { status.textContent = 'Отправлено!'; updateTime(); }
      else { const d = await res.json(); status.textContent = 'Ошибка: ' + (d.message || res.status); }
    } catch(e) { status.textContent = 'Ошибка соединения'; }
  } else {
    const token = document.getElementById('bot-token').value.trim();
    const channelId = document.getElementById('channel-id').value.trim();
    if (!token) { status.textContent = 'Укажи Bot токен'; return; }
    if (!channelId) { status.textContent = 'Выбери канал'; return; }
    const payload = buildPayload();
    status.textContent = 'Отправляю...';
    try {
      const res = await fetch(`https://dems.velori.workers.dev/channels/${channelId}/messages`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bot ${token}` },
        body: JSON.stringify(payload)
      });
      if (res.ok) { status.textContent = 'Отправлено!'; updateTime(); }
      else { const d = await res.json(); status.textContent = 'Ошибка: ' + (d.message || res.status); }
    } catch(e) { status.textContent = 'Ошибка соединения'; }
  }
}

function buildPayload() {
  if (currentMsgType === 'plain') {
    return { content: document.getElementById('plain-text').value };
  }
  const fields = [];
  document.querySelectorAll('#fields .field-block').forEach(block => {
    const name = block.querySelector('input[type=text]').value;
    const editor = block.querySelector('.editor');
    const value = editorToMarkdown(editor);
    if (!name || !value) return;
    fields.push({ name, value, inline: block.querySelector('input[type=checkbox]').checked });
  });
  const color = parseInt(document.getElementById('ecolorHex').value.replace('#', ''), 16);
  return {
    username: document.getElementById('username').value || undefined,
    embeds: [{
      title: document.getElementById('etitle').value || undefined,
      color,
      fields,
      footer: { text: document.getElementById('efooter').value || undefined }
    }]
  };
}

// ── INIT ──
loadCookies();
updateTime();
addField();
render();
</script>
